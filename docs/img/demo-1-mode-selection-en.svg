<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 380" font-family="-apple-system, 'Segoe UI', Roboto, sans-serif">
  <defs>
    <linearGradient id="bg-en1" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#1e1e2e"/>
      <stop offset="1" stop-color="#181825"/>
    </linearGradient>
    <linearGradient id="hl-en1" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#7c3aed" stop-opacity="0.25"/>
      <stop offset="1" stop-color="#7c3aed" stop-opacity="0.05"/>
    </linearGradient>
  </defs>

  <rect width="720" height="380" rx="10" fill="url(#bg-en1)"/>

  <!-- Title bar -->
  <rect x="0" y="0" width="720" height="36" fill="#11111b"/>
  <circle cx="20" cy="18" r="6" fill="#f38ba8"/>
  <circle cx="40" cy="18" r="6" fill="#f9e2af"/>
  <circle cx="60" cy="18" r="6" fill="#a6e3a1"/>
  <text x="360" y="23" text-anchor="middle" fill="#cdd6f4" font-size="13" opacity="0.7">Claude Code · AskUserQuestion</text>

  <!-- Question -->
  <text x="36" y="72" fill="#cdd6f4" font-size="16" font-weight="600">Step 1 — What do you want?</text>
  <text x="36" y="93" fill="#a6adc8" font-size="13">Tell me which output to run (you can change your mind anytime)</text>

  <!-- Option 1 (selected) -->
  <rect x="36" y="115" width="648" height="48" rx="6" fill="url(#hl-en1)" stroke="#7c3aed" stroke-width="1.5"/>
  <circle cx="58" cy="139" r="8" fill="none" stroke="#cba6f7" stroke-width="2"/>
  <circle cx="58" cy="139" r="4" fill="#cba6f7"/>
  <text x="80" y="135" fill="#cdd6f4" font-size="14" font-weight="600">A — Define "my AI principles"</text>
  <text x="80" y="153" fill="#a6adc8" font-size="12">Cross-task collaboration style · Outputs CLAUDE.md / AGENTS.md / .cursorrules</text>

  <!-- Option 2 -->
  <rect x="36" y="173" width="648" height="48" rx="6" fill="#313244" stroke="#45475a" stroke-width="1"/>
  <circle cx="58" cy="197" r="8" fill="none" stroke="#6c7086" stroke-width="2"/>
  <text x="80" y="193" fill="#cdd6f4" font-size="14" font-weight="600">B — Build a "custom skill"</text>
  <text x="80" y="211" fill="#a6adc8" font-size="12">Extract a recurring task into AI-executable skill · Outputs SKILL.md + examples + references</text>

  <!-- Option 3 -->
  <rect x="36" y="231" width="648" height="48" rx="6" fill="#313244" stroke="#45475a" stroke-width="1"/>
  <circle cx="58" cy="255" r="8" fill="none" stroke="#6c7086" stroke-width="2"/>
  <text x="80" y="251" fill="#cdd6f4" font-size="14" font-weight="600">C — Both <tspan fill="#a6e3a1" font-size="11">recommended</tspan></text>
  <text x="80" y="269" fill="#a6adc8" font-size="12">A first, then B · Define global contract, then extract high-frequency tasks into custom skills</text>

  <!-- Option 4 -->
  <rect x="36" y="289" width="648" height="48" rx="6" fill="#313244" stroke="#45475a" stroke-width="1"/>
  <circle cx="58" cy="313" r="8" fill="none" stroke="#6c7086" stroke-width="2"/>
  <text x="80" y="309" fill="#cdd6f4" font-size="14" font-weight="600">Other</text>
  <text x="80" y="327" fill="#a6adc8" font-size="12">Free input — describe what you want</text>

  <!-- Hint -->
  <text x="36" y="365" fill="#6c7086" font-size="11">↑↓ select   ⏎ submit   Tab next</text>
  <text x="684" y="365" text-anchor="end" fill="#6c7086" font-size="11">1 / 1</text>
</svg>
