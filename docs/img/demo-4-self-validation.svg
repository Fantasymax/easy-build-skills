<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 500" font-family="-apple-system, 'Segoe UI', Roboto, 'PingFang SC', 'Microsoft YaHei', sans-serif">
  <defs>
    <linearGradient id="bg4" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#1e1e2e"/>
      <stop offset="1" stop-color="#181825"/>
    </linearGradient>
  </defs>

  <rect width="720" height="500" rx="10" fill="url(#bg4)"/>

  <!-- Title bar -->
  <rect x="0" y="0" width="720" height="36" fill="#11111b"/>
  <circle cx="20" cy="18" r="6" fill="#f38ba8"/>
  <circle cx="40" cy="18" r="6" fill="#f9e2af"/>
  <circle cx="60" cy="18" r="6" fill="#a6e3a1"/>
  <text x="360" y="23" text-anchor="middle" fill="#cdd6f4" font-size="13" opacity="0.7">Claude Code · Step 7.5 AI 自测验证报告</text>

  <!-- Header -->
  <text x="36" y="68" fill="#cdd6f4" font-size="15" font-weight="600">🔍 我帮你跑了一次自测，{skill-name}</text>
  <text x="36" y="86" fill="#a6adc8" font-size="12">5 步流水线 · 共 4 项检查 · 1 项失败 · 2 项警告 · 1 项通过</text>

  <!-- Pass items -->
  <g transform="translate(36, 110)">
    <rect width="200" height="44" rx="6" fill="#181825" stroke="#a6e3a1" stroke-width="1"/>
    <text x="14" y="22" fill="#a6e3a1" font-size="14">✓</text>
    <text x="32" y="22" fill="#cdd6f4" font-size="12" font-weight="600">Schema 自检</text>
    <text x="32" y="38" fill="#a6adc8" font-size="11">frontmatter / 行数 / 字段全 ✓</text>
  </g>
  <g transform="translate(248, 110)">
    <rect width="200" height="44" rx="6" fill="#181825" stroke="#f9e2af" stroke-width="1"/>
    <text x="14" y="22" fill="#f9e2af" font-size="14">⚠</text>
    <text x="32" y="22" fill="#cdd6f4" font-size="12" font-weight="600">触发测试</text>
    <text x="32" y="38" fill="#a6adc8" font-size="11">10 / 9 通过（误触 2/5）</text>
  </g>
  <g transform="translate(460, 110)">
    <rect width="224" height="44" rx="6" fill="#181825" stroke="#f38ba8" stroke-width="1"/>
    <text x="14" y="22" fill="#f38ba8" font-size="14">✗</text>
    <text x="32" y="22" fill="#cdd6f4" font-size="12" font-weight="600">Dogfood 模拟</text>
    <text x="32" y="38" fill="#a6adc8" font-size="11">风格保真度 73%（&lt; 80% 阈值）</text>
  </g>
  <g transform="translate(36, 162)">
    <rect width="412" height="44" rx="6" fill="#181825" stroke="#f9e2af" stroke-width="1"/>
    <text x="14" y="22" fill="#f9e2af" font-size="14">⚠</text>
    <text x="32" y="22" fill="#cdd6f4" font-size="12" font-weight="600">覆盖率检查</text>
    <text x="32" y="38" fill="#a6adc8" font-size="11">B10 五类原话 4/5 · 红线 100% · 工具栈对齐 ✓</text>
  </g>

  <!-- Issues found -->
  <text x="36" y="232" fill="#cdd6f4" font-size="14" font-weight="600">⚠ 发现的问题（按严重度）</text>

  <!-- Critical -->
  <rect x="36" y="246" width="648" height="50" rx="6" fill="#181825" stroke="#f38ba8" stroke-width="1"/>
  <rect x="36" y="246" width="6" height="50" fill="#f38ba8"/>
  <text x="56" y="266" fill="#f38ba8" font-size="12" font-weight="600">🔴 严重 · description 缺关键触发词 "review"</text>
  <text x="56" y="284" fill="#a6adc8" font-size="11">建议：description 加 "Trigger when user says 'review my [X]'" · 影响：可能不被 Claude 触发</text>

  <!-- Medium -->
  <rect x="36" y="304" width="648" height="50" rx="6" fill="#181825" stroke="#f9e2af" stroke-width="1"/>
  <rect x="36" y="304" width="6" height="50" fill="#f9e2af"/>
  <text x="56" y="324" fill="#f9e2af" font-size="12" font-weight="600">🟡 中等 · 红线"客户数据脱敏"未在 Hard Rules 显式命中</text>
  <text x="56" y="342" fill="#a6adc8" font-size="11">建议：Hard Rules 加 "NEVER 在脱敏前贴客户原始数据" · 影响：用户最怕的事可能漏防御</text>

  <!-- Minor -->
  <rect x="36" y="362" width="648" height="50" rx="6" fill="#181825" stroke="#a6e3a1" stroke-width="1"/>
  <rect x="36" y="362" width="6" height="50" fill="#a6e3a1"/>
  <text x="56" y="382" fill="#a6e3a1" font-size="12" font-weight="600">🟢 轻微 · 风格保真度 73%（&lt; 80%）</text>
  <text x="56" y="400" fill="#a6adc8" font-size="11">建议：补 1 个 examples/good-2.md 强化"温和但坚定"语气 · 影响：边缘 case 可能偏离</text>

  <!-- Action prompt -->
  <text x="36" y="442" fill="#cdd6f4" font-size="13" font-weight="600">你怎么处理？</text>

  <g transform="translate(36, 452)">
    <rect width="124" height="36" rx="5" fill="#a6e3a1" fill-opacity="0.15" stroke="#a6e3a1" stroke-width="1.5"/>
    <text x="62" y="22" text-anchor="middle" fill="#a6e3a1" font-size="11" font-weight="600">① 全接受</text>
  </g>
  <g transform="translate(168, 452)">
    <rect width="124" height="36" rx="5" fill="#313244" stroke="#45475a" stroke-width="1"/>
    <text x="62" y="22" text-anchor="middle" fill="#74c7ec" font-size="11" font-weight="600">② 部分接受</text>
  </g>
  <g transform="translate(300, 452)">
    <rect width="124" height="36" rx="5" fill="#313244" stroke="#45475a" stroke-width="1"/>
    <text x="62" y="22" text-anchor="middle" fill="#f9e2af" font-size="11" font-weight="600">③ 拒绝优化</text>
  </g>
  <g transform="translate(432, 452)">
    <rect width="124" height="36" rx="5" fill="#313244" stroke="#45475a" stroke-width="1"/>
    <text x="62" y="22" text-anchor="middle" fill="#fab387" font-size="11" font-weight="600">④ 我自己改</text>
  </g>
  <g transform="translate(564, 452)">
    <rect width="120" height="36" rx="5" fill="#313244" stroke="#45475a" stroke-width="1"/>
    <text x="60" y="22" text-anchor="middle" fill="#cba6f7" font-size="11" font-weight="600">⑤ 详细说明</text>
  </g>
</svg>
