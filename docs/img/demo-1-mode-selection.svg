<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 380" font-family="-apple-system, 'Segoe UI', Roboto, 'PingFang SC', 'Microsoft YaHei', sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#1e1e2e"/>
      <stop offset="1" stop-color="#181825"/>
    </linearGradient>
    <linearGradient id="hl" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#7c3aed" stop-opacity="0.25"/>
      <stop offset="1" stop-color="#7c3aed" stop-opacity="0.05"/>
    </linearGradient>
  </defs>

  <rect width="720" height="380" rx="10" fill="url(#bg)"/>

  <!-- Title bar -->
  <rect x="0" y="0" width="720" height="36" fill="#11111b"/>
  <circle cx="20" cy="18" r="6" fill="#f38ba8"/>
  <circle cx="40" cy="18" r="6" fill="#f9e2af"/>
  <circle cx="60" cy="18" r="6" fill="#a6e3a1"/>
  <text x="360" y="23" text-anchor="middle" fill="#cdd6f4" font-size="13" opacity="0.7">Claude Code · AskUserQuestion</text>

  <!-- Question -->
  <text x="36" y="72" fill="#cdd6f4" font-size="16" font-weight="600">Step 1 — 你想要什么？</text>
  <text x="36" y="93" fill="#a6adc8" font-size="13">先告诉我跑哪种产出（任意时刻可改主意）</text>

  <!-- Option 1 (selected) -->
  <rect x="36" y="115" width="648" height="48" rx="6" fill="url(#hl)" stroke="#7c3aed" stroke-width="1.5"/>
  <circle cx="58" cy="139" r="8" fill="none" stroke="#cba6f7" stroke-width="2"/>
  <circle cx="58" cy="139" r="4" fill="#cba6f7"/>
  <text x="80" y="135" fill="#cdd6f4" font-size="14" font-weight="600">A — 给 AI 写一份"我的 principles"</text>
  <text x="80" y="153" fill="#a6adc8" font-size="12">定义整体协作风格，跨任务通用 · 输出 CLAUDE.md / AGENTS.md / .cursorrules</text>

  <!-- Option 2 -->
  <rect x="36" y="173" width="648" height="48" rx="6" fill="#313244" stroke="#45475a" stroke-width="1"/>
  <circle cx="58" cy="197" r="8" fill="none" stroke="#6c7086" stroke-width="2"/>
  <text x="80" y="193" fill="#cdd6f4" font-size="14" font-weight="600">B — 构建一个"我的 skill"</text>
  <text x="80" y="211" fill="#a6adc8" font-size="12">把某项重复任务凝练成 AI 可执行 skill · 输出 SKILL.md + examples + references</text>

  <!-- Option 3 -->
  <rect x="36" y="231" width="648" height="48" rx="6" fill="#313244" stroke="#45475a" stroke-width="1"/>
  <circle cx="58" cy="255" r="8" fill="none" stroke="#6c7086" stroke-width="2"/>
  <text x="80" y="251" fill="#cdd6f4" font-size="14" font-weight="600">C — 两者都要 <tspan fill="#a6e3a1" font-size="11">推荐</tspan></text>
  <text x="80" y="269" fill="#a6adc8" font-size="12">先 A 后 B · Mode A 建立全局契约，再从中挑高频任务抽专属 skill</text>

  <!-- Option 4 -->
  <rect x="36" y="289" width="648" height="48" rx="6" fill="#313244" stroke="#45475a" stroke-width="1"/>
  <circle cx="58" cy="313" r="8" fill="none" stroke="#6c7086" stroke-width="2"/>
  <text x="80" y="309" fill="#cdd6f4" font-size="14" font-weight="600">Other</text>
  <text x="80" y="327" fill="#a6adc8" font-size="12">自由输入：直接描述你想要的产物</text>

  <!-- Hint -->
  <text x="36" y="365" fill="#6c7086" font-size="11">↑↓ 选择   ⏎ 提交   Tab 切题</text>
  <text x="684" y="365" text-anchor="end" fill="#6c7086" font-size="11">1 / 1</text>
</svg>
