  <text x="80" y="336" fill="#cdd6f4" font-size="13" font-weight="600">像我家的猫（需要时召唤）<tspan fill="#f9e2af" font-size="10"> · 反向</tspan></text>
  <text x="80" y="352" fill="#a6adc8" font-size="11">完全不主动；只在我明确叫它时出现，做完就走</text>

  <!-- Option 5 -->
  <rect x="36" y="368" width="648" height="40" rx="6" fill="#313244" stroke="#45475a" stroke-width="1"/>
  <circle cx="58" cy="388" r="8" fill="none" stroke="#6c7086" stroke-width="2"/>
  <text x="80" y="384" fill="#cdd6f4" font-size="13" font-weight="600">编辑界的"刺猬"（戳问题不摸我）<tspan fill="#f9e2af" font-size="10"> · 跨界</tspan></text>
  <text x="80" y="400" fill="#a6adc8" font-size="11">只挑刺不安慰；我给的稿子它一定能找出 5 个问题</text>

  <!-- Hint -->
  <text x="36" y="438" fill="#6c7086" font-size="11">"Other" 由 AskUserQuestion 自动添加 · 自由输入永远兜底</text>
