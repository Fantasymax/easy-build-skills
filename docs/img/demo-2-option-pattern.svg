<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 460" font-family="-apple-system, 'Segoe UI', Roboto, 'PingFang SC', 'Microsoft YaHei', sans-serif">
  <defs>
    <linearGradient id="bg2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#1e1e2e"/>
      <stop offset="1" stop-color="#181825"/>
    </linearGradient>
  </defs>

  <rect width="720" height="460" rx="10" fill="url(#bg2)"/>

  <!-- Title bar -->
  <rect x="0" y="0" width="720" height="36" fill="#11111b"/>
  <circle cx="20" cy="18" r="6" fill="#f38ba8"/>
  <circle cx="40" cy="18" r="6" fill="#f9e2af"/>
  <circle cx="60" cy="18" r="6" fill="#a6e3a1"/>
  <text x="360" y="23" text-anchor="middle" fill="#cdd6f4" font-size="13" opacity="0.7">Claude Code · AskUserQuestion · A2/10</text>

  <!-- Question -->
  <text x="36" y="72" fill="#cdd6f4" font-size="16" font-weight="600">A2 — AI 应该像谁？</text>
  <text x="36" y="93" fill="#a6adc8" font-size="13">3 强相关 + 2 创意发散 + Other（自由输入兜底）</text>

  <!-- Section header: Strong related -->
  <rect x="36" y="108" width="120" height="22" rx="3" fill="#7c3aed" opacity="0.2"/>
  <text x="46" y="124" fill="#cba6f7" font-size="11" font-weight="600">3 强相关</text>

  <!-- Option 1 -->
  <rect x="36" y="138" width="648" height="40" rx="6" fill="#313244" stroke="#45475a" stroke-width="1"/>
  <circle cx="58" cy="158" r="8" fill="none" stroke="#6c7086" stroke-width="2"/>
  <text x="80" y="154" fill="#cdd6f4" font-size="13" font-weight="600">资深同事（会反对你）</text>
  <text x="80" y="170" fill="#a6adc8" font-size="11">5 年合作的搭档；有经验，会主动指出你哪里在偷懒</text>

  <!-- Option 2 -->
  <rect x="36" y="186" width="648" height="40" rx="6" fill="#313244" stroke="#45475a" stroke-width="1"/>
  <circle cx="58" cy="206" r="8" fill="none" stroke="#6c7086" stroke-width="2"/>
  <text x="80" y="202" fill="#cdd6f4" font-size="13" font-weight="600">私人助理（不越权）</text>
  <text x="80" y="218" fill="#a6adc8" font-size="11">高效执行；不替你拍板，遇决策点必请示</text>

  <!-- Option 3 -->
  <rect x="36" y="234" width="648" height="40" rx="6" fill="#313244" stroke="#45475a" stroke-width="1"/>
  <circle cx="58" cy="254" r="8" fill="none" stroke="#6c7086" stroke-width="2"/>
  <text x="80" y="250" fill="#cdd6f4" font-size="13" font-weight="600">教练（推动你）</text>
  <text x="80" y="266" fill="#a6adc8" font-size="11">问问题让你思考；不直接给答案，而是引导你自己想</text>

  <!-- Section header: Creative divergent -->
  <rect x="36" y="290" width="140" height="22" rx="3" fill="#f9e2af" opacity="0.2"/>
  <text x="46" y="306" fill="#f9e2af" font-size="11" font-weight="600">2 创意发散</text>

  <!-- Option 4 -->
  <rect x="36" y="320" width="648" height="40" rx="6" fill="#313244" stroke="#45475a" stroke-width="1"/>
