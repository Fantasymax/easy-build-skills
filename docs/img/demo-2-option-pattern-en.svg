<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 460" font-family="-apple-system, 'Segoe UI', Roboto, sans-serif">
  <defs>
    <linearGradient id="bg-en2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#1e1e2e"/>
      <stop offset="1" stop-color="#181825"/>
    </linearGradient>
  </defs>

  <rect width="720" height="460" rx="10" fill="url(#bg-en2)"/>

  <!-- Title bar -->
  <rect x="0" y="0" width="720" height="36" fill="#11111b"/>
  <circle cx="20" cy="18" r="6" fill="#f38ba8"/>
  <circle cx="40" cy="18" r="6" fill="#f9e2af"/>
  <circle cx="60" cy="18" r="6" fill="#a6e3a1"/>
  <text x="360" y="23" text-anchor="middle" fill="#cdd6f4" font-size="13" opacity="0.7">Claude Code · AskUserQuestion · A2/10</text>

  <!-- Question -->
  <text x="36" y="72" fill="#cdd6f4" font-size="16" font-weight="600">A2 — Who should the AI be like?</text>
  <text x="36" y="93" fill="#a6adc8" font-size="13">3 strong-related + 2 creative-divergent + Other (free-input fallback)</text>

  <!-- Section header: Strong related -->
  <rect x="36" y="108" width="170" height="22" rx="3" fill="#7c3aed" opacity="0.2"/>
  <text x="46" y="124" fill="#cba6f7" font-size="11" font-weight="600">3 strong-related</text>

  <!-- Option 1 -->
  <rect x="36" y="138" width="648" height="40" rx="6" fill="#313244" stroke="#45475a" stroke-width="1"/>
  <circle cx="58" cy="158" r="8" fill="none" stroke="#6c7086" stroke-width="2"/>
  <text x="80" y="154" fill="#cdd6f4" font-size="13" font-weight="600">Senior colleague (pushes back on you)</text>
  <text x="80" y="170" fill="#a6adc8" font-size="11">5-year partner; experienced; calls out where you're cutting corners</text>

  <!-- Option 2 -->
  <rect x="36" y="186" width="648" height="40" rx="6" fill="#313244" stroke="#45475a" stroke-width="1"/>
  <circle cx="58" cy="206" r="8" fill="none" stroke="#6c7086" stroke-width="2"/>
  <text x="80" y="202" fill="#cdd6f4" font-size="13" font-weight="600">Personal assistant (won't overstep)</text>
  <text x="80" y="218" fill="#a6adc8" font-size="11">Efficient executor; never makes calls for you; pauses at decision points</text>

  <!-- Option 3 -->
  <rect x="36" y="234" width="648" height="40" rx="6" fill="#313244" stroke="#45475a" stroke-width="1"/>
  <circle cx="58" cy="254" r="8" fill="none" stroke="#6c7086" stroke-width="2"/>
  <text x="80" y="250" fill="#cdd6f4" font-size="13" font-weight="600">Coach (drives you forward)</text>
  <text x="80" y="266" fill="#a6adc8" font-size="11">Asks questions to make you think; doesn't give answers, guides discovery</text>

  <!-- Section header: Creative divergent -->
  <rect x="36" y="290" width="180" height="22" rx="3" fill="#f9e2af" opacity="0.2"/>
  <text x="46" y="306" fill="#f9e2af" font-size="11" font-weight="600">2 creative-divergent</text>

  <!-- Option 4 -->
  <rect x="36" y="320" width="648" height="40" rx="6" fill="#313244" stroke="#45475a" stroke-width="1"/>
  <circle cx="58" cy="340" r="8" fill="none" stroke="#6c7086" stroke-width="2"/>
  <text x="80" y="336" fill="#cdd6f4" font-size="13" font-weight="600">Like my cat (called when needed)<tspan fill="#f9e2af" font-size="10"> · inverted</tspan></text>
  <text x="80" y="352" fill="#a6adc8" font-size="11">Never proactive; only appears when you explicitly call; leaves when done</text>

  <!-- Option 5 -->
  <rect x="36" y="368" width="648" height="40" rx="6" fill="#313244" stroke="#45475a" stroke-width="1"/>
  <circle cx="58" cy="388" r="8" fill="none" stroke="#6c7086" stroke-width="2"/>
  <text x="80" y="384" fill="#cdd6f4" font-size="13" font-weight="600">Editorial "hedgehog" (jabs issues, doesn't soothe)<tspan fill="#f9e2af" font-size="10"> · cross-domain</tspan></text>
  <text x="80" y="400" fill="#a6adc8" font-size="11">Picks holes, never comforts; will find 5 issues in any draft you give it</text>

  <!-- Hint -->
  <text x="36" y="438" fill="#6c7086" font-size="11">"Other" auto-added by AskUserQuestion · Free-input always available</text>
</svg>
