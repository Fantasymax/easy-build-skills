<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 480" font-family="-apple-system, 'Segoe UI', Roboto, sans-serif">
  <defs>
    <linearGradient id="bg-en3" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#1e1e2e"/>
      <stop offset="1" stop-color="#181825"/>
    </linearGradient>
    <linearGradient id="hl-en3" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#a6e3a1" stop-opacity="0.15"/>
      <stop offset="1" stop-color="#a6e3a1" stop-opacity="0.03"/>
    </linearGradient>
  </defs>

  <rect width="720" height="480" rx="10" fill="url(#bg-en3)"/>

  <!-- Title bar -->
  <rect x="0" y="0" width="720" height="36" fill="#11111b"/>
  <circle cx="20" cy="18" r="6" fill="#f38ba8"/>
  <circle cx="40" cy="18" r="6" fill="#f9e2af"/>
  <circle cx="60" cy="18" r="6" fill="#a6e3a1"/>
  <text x="360" y="23" text-anchor="middle" fill="#cdd6f4" font-size="13" opacity="0.7">Claude Code · Step 5.5 Shape Inference + 5-Option Feedback</text>

  <!-- Proposal card -->
  <text x="36" y="68" fill="#cdd6f4" font-size="15" font-weight="600">🔍 Based on your answers, here's what I'm building:</text>

  <rect x="36" y="82" width="648" height="218" rx="8" fill="#181825" stroke="#313244" stroke-width="1"/>

  <text x="52" y="106" fill="#a6e3a1" font-size="13" font-weight="600">【Topic + Editing + AI-tone-check Pipeline Tool】</text>

  <text x="52" y="132" fill="#cdd6f4" font-size="12" font-weight="600">✓ What AI auto-does</text>
  <text x="64" y="148" fill="#a6adc8" font-size="11">Read your sources → propose 3 topic angles → polish drafts → check AI-tone before publish</text>

  <text x="52" y="172" fill="#f38ba8" font-size="12" font-weight="600">✗ What AI never does (your red lines)</text>
  <text x="64" y="188" fill="#a6adc8" font-size="11">Draws conclusions for you / changes core arguments / uses cliche/saccharine phrases</text>

  <text x="52" y="212" fill="#cba6f7" font-size="12" font-weight="600">⚙ Mechanical checkpoints (program-judged, not model-guessed)</text>
  <text x="64" y="228" fill="#a6adc8" font-size="11">regex detect ✨💪 emoji → auto-strip · "took a deep breath/eyes flashed" → halt</text>

  <text x="52" y="252" fill="#f9e2af" font-size="12" font-weight="600">⏸ When AI pauses to ask you</text>
  <text x="64" y="268" fill="#a6adc8" font-size="11">≥ 2 topic candidates → you decide · core argument changes → must ask first</text>

  <text x="52" y="290" fill="#74c7ec" font-size="12" font-weight="600">📁 You'll get 4 files + 0 config cost</text>

  <!-- Feedback prompt -->
  <text x="36" y="328" fill="#cdd6f4" font-size="14" font-weight="600">What do you think?</text>

  <!-- 5 options in a row -->
  <g transform="translate(36, 342)">
    <rect width="120" height="56" rx="6" fill="url(#hl-en3)" stroke="#a6e3a1" stroke-width="1.5"/>
    <text x="60" y="22" text-anchor="middle" fill="#a6e3a1" font-size="14" font-weight="600">①</text>
    <text x="60" y="40" text-anchor="middle" fill="#cdd6f4" font-size="12">Good</text>
    <text x="60" y="52" text-anchor="middle" fill="#a6adc8" font-size="9">as-is</text>
  </g>

  <g transform="translate(168, 342)">
    <rect width="120" height="56" rx="6" fill="#313244" stroke="#45475a" stroke-width="1"/>
    <text x="60" y="22" text-anchor="middle" fill="#74c7ec" font-size="14" font-weight="600">②</text>
    <text x="60" y="40" text-anchor="middle" fill="#cdd6f4" font-size="12">Missing</text>
    <text x="60" y="52" text-anchor="middle" fill="#a6adc8" font-size="9">what's gap</text>
  </g>
  <g transform="translate(300, 342)">
    <rect width="120" height="56" rx="6" fill="#313244" stroke="#45475a" stroke-width="1"/>
    <text x="60" y="22" text-anchor="middle" fill="#f9e2af" font-size="14" font-weight="600">③</text>
    <text x="60" y="40" text-anchor="middle" fill="#cdd6f4" font-size="12">Too complex</text>
    <text x="60" y="52" text-anchor="middle" fill="#a6adc8" font-size="9">too manual</text>
  </g>
  <g transform="translate(432, 342)">
    <rect width="120" height="56" rx="6" fill="#313244" stroke="#45475a" stroke-width="1"/>
    <text x="60" y="22" text-anchor="middle" fill="#fab387" font-size="14" font-weight="600">④</text>
    <text x="60" y="40" text-anchor="middle" fill="#cdd6f4" font-size="12">Too simple</text>
    <text x="60" y="52" text-anchor="middle" fill="#a6adc8" font-size="9">missed X</text>
  </g>
  <g transform="translate(564, 342)">
    <rect width="120" height="56" rx="6" fill="#313244" stroke="#45475a" stroke-width="1"/>
    <text x="60" y="22" text-anchor="middle" fill="#cba6f7" font-size="14" font-weight="600">⑤ 🖊</text>
    <text x="60" y="40" text-anchor="middle" fill="#cdd6f4" font-size="12">I'll say</text>
    <text x="60" y="52" text-anchor="middle" fill="#a6adc8" font-size="9">power user</text>
  </g>

  <!-- Hint -->
  <text x="36" y="424" fill="#a6adc8" font-size="12">⑤ free-input supports 4 levels: terminology / revision / scope / full override — power-user agency</text>
  <text x="36" y="448" fill="#6c7086" font-size="11">Max 3 rounds · 3rd round w/o ① → AI suggests "dogfood V1 first, then iterate"</text>
</svg>
