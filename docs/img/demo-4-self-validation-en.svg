<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 500" font-family="-apple-system, 'Segoe UI', Roboto, sans-serif">
  <defs>
    <linearGradient id="bg-en4" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#1e1e2e"/>
      <stop offset="1" stop-color="#181825"/>
    </linearGradient>
  </defs>

  <rect width="720" height="500" rx="10" fill="url(#bg-en4)"/>

  <!-- Title bar -->
  <rect x="0" y="0" width="720" height="36" fill="#11111b"/>
  <circle cx="20" cy="18" r="6" fill="#f38ba8"/>
  <circle cx="40" cy="18" r="6" fill="#f9e2af"/>
  <circle cx="60" cy="18" r="6" fill="#a6e3a1"/>
  <text x="360" y="23" text-anchor="middle" fill="#cdd6f4" font-size="13" opacity="0.7">Claude Code · Step 7.5 AI Self-Validation Report</text>

  <!-- Header -->
  <text x="36" y="68" fill="#cdd6f4" font-size="15" font-weight="600">🔍 I ran a self-test on your {skill-name}</text>
  <text x="36" y="86" fill="#a6adc8" font-size="12">5-step pipeline · 4 checks · 1 failed · 2 warnings · 1 passed</text>

  <!-- Pass items -->
  <g transform="translate(36, 110)">
    <rect width="200" height="44" rx="6" fill="#181825" stroke="#a6e3a1" stroke-width="1"/>
    <text x="14" y="22" fill="#a6e3a1" font-size="14">✓</text>
    <text x="32" y="22" fill="#cdd6f4" font-size="12" font-weight="600">Schema check</text>
    <text x="32" y="38" fill="#a6adc8" font-size="11">frontmatter / lines / fields ✓</text>
  </g>
  <g transform="translate(248, 110)">
    <rect width="200" height="44" rx="6" fill="#181825" stroke="#f9e2af" stroke-width="1"/>
    <text x="14" y="22" fill="#f9e2af" font-size="14">⚠</text>
    <text x="32" y="22" fill="#cdd6f4" font-size="12" font-weight="600">Trigger test</text>
    <text x="32" y="38" fill="#a6adc8" font-size="11">10/9 pass (2/5 false-positive)</text>
  </g>
  <g transform="translate(460, 110)">
    <rect width="224" height="44" rx="6" fill="#181825" stroke="#f38ba8" stroke-width="1"/>
    <text x="14" y="22" fill="#f38ba8" font-size="14">✗</text>
    <text x="32" y="22" fill="#cdd6f4" font-size="12" font-weight="600">Dogfood simulation</text>
    <text x="32" y="38" fill="#a6adc8" font-size="11">style fidelity 73% (&lt; 80% threshold)</text>
  </g>
  <g transform="translate(36, 162)">
    <rect width="412" height="44" rx="6" fill="#181825" stroke="#f9e2af" stroke-width="1"/>
    <text x="14" y="22" fill="#f9e2af" font-size="14">⚠</text>
    <text x="32" y="22" fill="#cdd6f4" font-size="12" font-weight="600">Coverage check</text>
    <text x="32" y="38" fill="#a6adc8" font-size="11">B10 quotes 4/5 · red lines 100% · tool stack ✓</text>
  </g>

  <!-- Issues found -->
  <text x="36" y="232" fill="#cdd6f4" font-size="14" font-weight="600">⚠ Issues found (by severity)</text>

  <!-- Critical -->
  <rect x="36" y="246" width="648" height="50" rx="6" fill="#181825" stroke="#f38ba8" stroke-width="1"/>
  <rect x="36" y="246" width="6" height="50" fill="#f38ba8"/>
  <text x="56" y="266" fill="#f38ba8" font-size="12" font-weight="600">🔴 Critical · description missing key trigger word "review"</text>
  <text x="56" y="284" fill="#a6adc8" font-size="11">Suggest: add "Trigger when user says 'review my [X]'" · Impact: may not trigger in Claude</text>

  <!-- Medium -->
  <rect x="36" y="304" width="648" height="50" rx="6" fill="#181825" stroke="#f9e2af" stroke-width="1"/>
  <rect x="36" y="304" width="6" height="50" fill="#f9e2af"/>
  <text x="56" y="324" fill="#f9e2af" font-size="12" font-weight="600">🟡 Medium · red line "client data redaction" not explicitly in Hard Rules</text>
  <text x="56" y="342" fill="#a6adc8" font-size="11">Suggest: add "NEVER paste raw client data before redaction" · Impact: biggest fear unguarded</text>

  <!-- Minor -->
  <rect x="36" y="362" width="648" height="50" rx="6" fill="#181825" stroke="#a6e3a1" stroke-width="1"/>
  <rect x="36" y="362" width="6" height="50" fill="#a6e3a1"/>
  <text x="56" y="382" fill="#a6e3a1" font-size="12" font-weight="600">🟢 Minor · style fidelity 73% (&lt; 80%)</text>
  <text x="56" y="400" fill="#a6adc8" font-size="11">Suggest: add 1 examples/good-2.md for "firm but warm" tone · Impact: edge case drift</text>

  <!-- Action prompt -->
  <text x="36" y="442" fill="#cdd6f4" font-size="13" font-weight="600">How would you like to handle these?</text>

  <g transform="translate(36, 452)">
    <rect width="124" height="36" rx="5" fill="#a6e3a1" fill-opacity="0.15" stroke="#a6e3a1" stroke-width="1.5"/>
    <text x="62" y="22" text-anchor="middle" fill="#a6e3a1" font-size="11" font-weight="600">① Accept all</text>
  </g>
  <g transform="translate(168, 452)">
    <rect width="124" height="36" rx="5" fill="#313244" stroke="#45475a" stroke-width="1"/>
    <text x="62" y="22" text-anchor="middle" fill="#74c7ec" font-size="11" font-weight="600">② Partial</text>
  </g>
  <g transform="translate(300, 452)">
    <rect width="124" height="36" rx="5" fill="#313244" stroke="#45475a" stroke-width="1"/>
    <text x="62" y="22" text-anchor="middle" fill="#f9e2af" font-size="11" font-weight="600">③ Reject</text>
  </g>
  <g transform="translate(432, 452)">
    <rect width="124" height="36" rx="5" fill="#313244" stroke="#45475a" stroke-width="1"/>
    <text x="62" y="22" text-anchor="middle" fill="#fab387" font-size="11" font-weight="600">④ I'll fix</text>
  </g>
  <g transform="translate(564, 452)">
    <rect width="120" height="36" rx="5" fill="#313244" stroke="#45475a" stroke-width="1"/>
    <text x="60" y="22" text-anchor="middle" fill="#cba6f7" font-size="11" font-weight="600">⑤ Show details</text>
  </g>
</svg>
