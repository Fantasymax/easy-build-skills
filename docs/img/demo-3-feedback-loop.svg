<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 480" font-family="-apple-system, 'Segoe UI', Roboto, 'PingFang SC', 'Microsoft YaHei', sans-serif">
  <defs>
    <linearGradient id="bg3" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#1e1e2e"/>
      <stop offset="1" stop-color="#181825"/>
    </linearGradient>
  </defs>

  <rect width="720" height="480" rx="10" fill="url(#bg3)"/>

  <!-- Title bar -->
  <rect x="0" y="0" width="720" height="36" fill="#11111b"/>
  <circle cx="20" cy="18" r="6" fill="#f38ba8"/>
  <circle cx="40" cy="18" r="6" fill="#f9e2af"/>
  <circle cx="60" cy="18" r="6" fill="#a6e3a1"/>
  <text x="360" y="23" text-anchor="middle" fill="#cdd6f4" font-size="13" opacity="0.7">Claude Code · Step 5.5 形态反推 + 5 选项反馈</text>

  <!-- Proposal card -->
  <text x="36" y="68" fill="#cdd6f4" font-size="15" font-weight="600">🔍 我看了你的回答，给你做的工具应该长这样：</text>

  <rect x="36" y="82" width="648" height="218" rx="8" fill="#181825" stroke="#313244" stroke-width="1"/>

  <text x="52" y="106" fill="#a6e3a1" font-size="13" font-weight="600">【选题 + 改稿 + 痕迹检查 全流程工具】</text>

  <text x="52" y="132" fill="#cdd6f4" font-size="12" font-weight="600">✓ AI 自动会做的</text>
  <text x="64" y="148" fill="#a6adc8" font-size="11">读取你的素材库 → 生成 3 个候选选题 → 改稿压塑料感 → 发布前查 AI 痕迹</text>

  <text x="52" y="172" fill="#f38ba8" font-size="12" font-weight="600">✗ AI 永远不会做的（红线）</text>
  <text x="64" y="188" fill="#a6adc8" font-size="11">替你下立场结论 / 改你的核心观点 / 用"亲爱的"等鸡汤腔</text>

  <text x="52" y="212" fill="#cba6f7" font-size="12" font-weight="600">⚙ 机械化检查点（程序判定，不靠模型猜）</text>
  <text x="64" y="228" fill="#a6adc8" font-size="11">regex 检测段落含 ✨💪 emoji → 自动删 · "深呼吸/眼中闪过" 等塑料词触发 halt</text>

  <text x="52" y="252" fill="#f9e2af" font-size="12" font-weight="600">⏸ AI 拿不准会停下来问你的</text>
  <text x="64" y="268" fill="#a6adc8" font-size="11">选题角度 ≥ 2 个候选时由你拍板 · 改稿涉及核心论点改写时必请示</text>

  <text x="52" y="290" fill="#74c7ec" font-size="12" font-weight="600">📁 你会拿到 4 个文件 + 0 配置成本</text>

  <!-- Feedback prompt -->
  <text x="36" y="328" fill="#cdd6f4" font-size="14" font-weight="600">你怎么看？</text>

  <!-- 5 options in a row -->
  <g transform="translate(36, 342)">
    <rect width="120" height="56" rx="6" fill="url(#hl3-1)" stroke="#a6e3a1" stroke-width="1.5"/>
    <text x="60" y="22" text-anchor="middle" fill="#a6e3a1" font-size="14" font-weight="600">①</text>
    <text x="60" y="40" text-anchor="middle" fill="#cdd6f4" font-size="12">够用</text>
    <text x="60" y="52" text-anchor="middle" fill="#a6adc8" font-size="9">就这样</text>
  </g>
  <defs>
    <linearGradient id="hl3-1" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#a6e3a1" stop-opacity="0.15"/>
      <stop offset="1" stop-color="#a6e3a1" stop-opacity="0.03"/>
    </linearGradient>
  </defs>

  <g transform="translate(168, 342)">
    <rect width="120" height="56" rx="6" fill="#313244" stroke="#45475a" stroke-width="1"/>
    <text x="60" y="22" text-anchor="middle" fill="#74c7ec" font-size="14" font-weight="600">②</text>
    <text x="60" y="40" text-anchor="middle" fill="#cdd6f4" font-size="12">不够好</text>
    <text x="60" y="52" text-anchor="middle" fill="#a6adc8" font-size="9">哪里漏了</text>
  </g>
  <g transform="translate(300, 342)">
    <rect width="120" height="56" rx="6" fill="#313244" stroke="#45475a" stroke-width="1"/>
    <text x="60" y="22" text-anchor="middle" fill="#f9e2af" font-size="14" font-weight="600">③</text>
    <text x="60" y="40" text-anchor="middle" fill="#cdd6f4" font-size="12">太复杂</text>
    <text x="60" y="52" text-anchor="middle" fill="#a6adc8" font-size="9">手动太多</text>
  </g>
  <g transform="translate(432, 342)">
    <rect width="120" height="56" rx="6" fill="#313244" stroke="#45475a" stroke-width="1"/>
    <text x="60" y="22" text-anchor="middle" fill="#fab387" font-size="14" font-weight="600">④</text>
    <text x="60" y="40" text-anchor="middle" fill="#cdd6f4" font-size="12">太简单</text>
    <text x="60" y="52" text-anchor="middle" fill="#a6adc8" font-size="9">漏了 X</text>
  </g>
  <g transform="translate(564, 342)">
    <rect width="120" height="56" rx="6" fill="#313244" stroke="#45475a" stroke-width="1"/>
    <text x="60" y="22" text-anchor="middle" fill="#cba6f7" font-size="14" font-weight="600">⑤ 🖊</text>
    <text x="60" y="40" text-anchor="middle" fill="#cdd6f4" font-size="12">我自己说</text>
    <text x="60" y="52" text-anchor="middle" fill="#a6adc8" font-size="9">高级用户</text>
  </g>

  <!-- Hint -->
  <text x="36" y="424" fill="#a6adc8" font-size="12">⑤ 自行输入支持 4 层：术语级 / 修订级 / 范围级 / 完全 override —— 熟练用户 agency 出口</text>
  <text x="36" y="448" fill="#6c7086" font-size="11">最多 3 轮收敛 · 第 3 轮还没 ① 时 AI 主动建议"先 dogfood V1 再调"</text>
</svg>
